<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — jojozelan Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/login.css">

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-storage-compat.js"></script>
    <script src="js/script.js" defer></script>
    <script src="js/firebase.js"></script>
</head>

<body class="login-page">

    <header class="glass-header">
        <a href="../index.html" class="logo" style="text-decoration:none; color:inherit;">jojoTools</a>
        <nav class="center-links">
            <a href="PolyMetro.html">Metrônomo</a>
            <a href="ScaleMachine.html">Escalas</a>
            <a href="HarmonicMap.html">Gravidade</a>
            <a href="TabPlayer.html">Tablatura</a>
        </nav>
        <nav></nav>
    </header>

    <main class="login-main">
        <div class="login-card glass-card">

            <div class="login-icon">
                <i class="fas fa-guitar"></i>
            </div>
            <h1 class="login-title" data-i18n="login_title">Entrar</h1>
            <p class="login-sub" data-i18n="login_sub">Salve suas tabs, perfil e progresso na nuvem.</p>

            <button id="btn-google" class="login-btn google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                <span data-i18n="login_google">Continuar com Google</span>
            </button>

            <div class="login-divider"><span data-i18n="login_or">ou</span></div>

            <form id="form-email" class="login-form" novalidate>
                <div class="field-group">
                    <label for="inp-email"><i class="fas fa-envelope"></i> <span
                            data-i18n="login_email_lbl">E-mail</span></label>
                    <input type="email" id="inp-email" data-i18n-placeholder="login_email_ph"
                        placeholder="seu@email.com" autocomplete="email">
                </div>
                <div class="field-group">
                    <label for="inp-pass"><i class="fas fa-lock"></i> <span
                            data-i18n="login_pass_lbl">Senha</span></label>
                    <input type="password" id="inp-pass" data-i18n-placeholder="login_pass_ph" placeholder="••••••••"
                        autocomplete="current-password">
                </div>
                <p id="login-error" class="login-error tp-hidden"></p>
                <button type="submit" id="btn-email" class="login-btn primary-btn">
                    <i class="fas fa-sign-in-alt"></i> <span id="btn-email-txt"
                        data-i18n="login_btn_enter">Entrar</span>
                </button>
                <button type="button" id="btn-register" class="login-link-btn">
                    <span id="reg-prefix" data-i18n="login_no_account">Não tem conta?</span> <span id="reg-action"
                        data-i18n="login_btn_register">Criar conta</span>
                </button>
            </form>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // CORREÇÃO: Usa ../index.html para não quebrar o caminho
            const fromUrl = new URLSearchParams(window.location.search).get('from') || '../index.html';

            // CORREÇÃO: Variável para impedir o redirecionamento atropelado
            window.isLoggingIn = false;

            window.fbAuth.onAuthStateChanged(user => {
                if (user && !window.isLoggingIn) {
                    window.location.href = fromUrl;
                }
            });

            // --- Google ---
            document.getElementById('btn-google').addEventListener('click', async () => {
                window.isLoggingIn = true; // Avisa que o processo manual começou
                try {
                    await window.fbAuth.signInWithPopup(window.fbGoogleProvider);
                    window.location.href = fromUrl;
                } catch (e) {
                    window.isLoggingIn = false;
                    showError(t('login_err_' + _codeKey(e.code)));
                }
            });

            // --- Email sign-in / register toggle ---
            let isRegister = false;
            const btnReg = document.getElementById('btn-register');
            const btnEmail = document.getElementById('btn-email');
            const btnEmailTxt = document.getElementById('btn-email-txt');
            const regPrefix = document.getElementById('reg-prefix');
            const regAction = document.getElementById('reg-action');

            btnReg.addEventListener('click', () => {
                isRegister = !isRegister;
                if (isRegister) {
                    btnEmailTxt.setAttribute('data-i18n', 'login_btn_register');
                    btnEmailTxt.textContent = t('login_btn_register');
                    btnEmail.querySelector('.fa-sign-in-alt')?.classList.replace('fa-sign-in-alt', 'fa-user-plus');
                    regPrefix.setAttribute('data-i18n', 'login_has_account');
                    regPrefix.textContent = t('login_has_account');
                    regAction.setAttribute('data-i18n', 'login_btn_enter');
                    regAction.textContent = t('login_btn_enter');
                } else {
                    btnEmailTxt.setAttribute('data-i18n', 'login_btn_enter');
                    btnEmailTxt.textContent = t('login_btn_enter');
                    btnEmail.querySelector('.fa-user-plus')?.classList.replace('fa-user-plus', 'fa-sign-in-alt');
                    regPrefix.setAttribute('data-i18n', 'login_no_account');
                    regPrefix.textContent = t('login_no_account');
                    regAction.setAttribute('data-i18n', 'login_btn_register');
                    regAction.textContent = t('login_btn_register');
                }
                clearError();
            });

            document.getElementById('form-email').addEventListener('submit', async (e) => {
                e.preventDefault();
                clearError();
                const email = document.getElementById('inp-email').value.trim();
                const pass = document.getElementById('inp-pass').value;
                if (!email || !pass) { showError(t('login_err_fill')); return; }
                
                window.isLoggingIn = true; // Avisa que o processo manual começou

                try {
                    if (isRegister) {
                        const cred = await window.fbAuth.createUserWithEmailAndPassword(email, pass);
                        
                        // CORREÇÃO: Garante que o documento seja criado ANTES de sair da página
                        await window.fbDb.collection('users').doc(cred.user.uid).set({
                            username: '',
                            bio: '',
                            avatarUrl: '',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                        
                        window.location.href = fromUrl;
                    } else {
                        await window.fbAuth.signInWithEmailAndPassword(email, pass);
                        window.location.href = fromUrl;
                    }
                } catch (e) {
                    window.isLoggingIn = false;
                    showError(t('login_err_' + _codeKey(e.code)));
                }
            });

            function showError(msg) {
                const el = document.getElementById('login-error');
                el.textContent = msg || t('login_err_generic');
                el.classList.remove('tp-hidden');
            }
            function clearError() {
                const el = document.getElementById('login-error');
                el.textContent = '';
                el.classList.add('tp-hidden');
            }
            function _codeKey(code) {
                const map = {
                    'auth/user-not-found': 'notfound',
                    'auth/wrong-password': 'wrongpass',
                    'auth/email-already-in-use': 'inuse',
                    'auth/invalid-email': 'invalidemail',
                    'auth/weak-password': 'weakpass',
                    'auth/popup-closed-by-user': 'popup',
                };
                return map[code] || 'generic';
            }
        });
    </script>
</body>

</html>
